    <script tyep="text/javascript">

            $(function(){
                if($(window).width() > 1023) { 		
          
                // CURSOR
                var cursor = $(".cursor");

                var posX = 0, posY = 0;
                var mouseX = 0, mouseY = 0;

                TweenMax.to({}, 0.016, {
                    repeat: -1,
                    onRepeat: function() {
                        posX += (mouseX - posX) / 9;
                        posY += (mouseY - posY) / 9;
                        TweenMax.set(cursor, {
                            css: {left: mouseX, top: mouseY}
                        });
                    }
                });

                // cursor active area
                $(".section03, .section04").on("mousemove", function(e) {
                    mouseX = e.clientX;
                    mouseY = e.clientY;
                }).on("mouseenter", function(e) {
                    $(".cursor").css('opacity', 1);
                }).on("mouseleave", function(e) {
                    $(".cursor").css('opacity', 0);
                });

                // link area css 
                $(".section03 a").on("mouseenter", function() {
                    cursor.addClass("pointer");
                }).on("mouseleave", function() {
                    cursor.removeClass("pointer");
                })
                        } 

            });


    </script>
